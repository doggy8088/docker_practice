name: Deploy mdPress site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["zh-tw"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install Chromium and CJK fonts
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
      - name: Install mdpress 0.7.10
        env:
          MDPRESS_VERSION: "0.7.10"
          MDPRESS_SHA256: "17e53e455996940bbbce64c69c43b3fb543f1501e03b74cf0434074efebd2db4"
        run: |
          archive="/tmp/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" -o "$archive"
          echo "${MDPRESS_SHA256}  $archive" | sha256sum -c -
          tar xzf "$archive" -C /tmp mdpress
          sudo mv /tmp/mdpress /usr/local/bin/
          mdpress --version
      - name: Install dependencies
        run: npm install
      - name: Build PDF
        run: mdpress build --format pdf --output docker_practice-zh-tw.pdf
      - name: Build site
        run: npm run build
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-practice-pdf
          path: docker_practice-zh-tw.pdf
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v6
        with:
          name: docker-practice-pdf
      - name: Publish PDF to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          upstream_release="$(gh api repos/yeasy/docker_practice/releases/latest)"
          RELEASE_TAG="$(printf '%s' "$upstream_release" | jq -r .tag_name)"
          RELEASE_TITLE="$(printf '%s' "$upstream_release" | jq -r '.name // .tag_name')"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE"
            gh release upload "$RELEASE_TAG" docker_practice-zh-tw.pdf --clobber
          else
            gh release create "$RELEASE_TAG" docker_practice-zh-tw.pdf \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes "正體中文 PDF 自動建置版本。"
          fi
